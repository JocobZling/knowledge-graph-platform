name: Sync WayToAGI Source

on:
  schedule:
    # 每天 08:10 Asia/Shanghai = 00:10 UTC，早于 09:00 智能测试日报。
    - cron: "10 0 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/sync-waytoagi.yml"
      - "scripts/sync_waytoagi.py"

permissions:
  contents: write

concurrency:
  group: sync-waytoagi-source
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install "playwright>=1.45,<2"
          python -m playwright install --with-deps chromium

      - name: Synchronize WayToAGI page
        id: sync
        continue-on-error: true
        env:
          WAYTOAGI_URL: "https://waytoagi.feishu.cn/wiki/QPe5w5g7UisbEkkow8XcDmOpn8e"
          FEISHU_STORAGE_STATE_JSON: ${{ secrets.FEISHU_STORAGE_STATE_JSON }}
          TZ: Asia/Shanghai
        run: python scripts/sync_waytoagi.py

      - name: Commit cache and status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sources/waytoagi/
          if git diff --cached --quiet; then
            echo "No WayToAGI cache changes to commit."
          else
            git commit -m "chore(sources): refresh WayToAGI cache"
            git push
          fi

      - name: Fail workflow when synchronization failed
        if: steps.sync.outcome == 'failure'
        run: |
          echo "WayToAGI synchronization failed. See data/sources/waytoagi/status.json for details."
          exit 1
