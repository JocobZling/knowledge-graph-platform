name: Deep Sync WayToAGI Source

on:
  schedule:
    # 每天 08:15 Asia/Shanghai = 00:15 UTC，在基础抓取之后补抓虚拟化内容。
    - cron: "15 0 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/sync-waytoagi-deep.yml"
      - "scripts/sync_waytoagi_deep.py"

permissions:
  contents: write

concurrency:
  group: sync-waytoagi-source
  cancel-in-progress: false

jobs:
  deep-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install "playwright>=1.45,<2"
          python -m playwright install --with-deps chromium

      - name: Capture virtualized WayToAGI content
        id: sync
        continue-on-error: true
        env:
          WAYTOAGI_URL: "https://waytoagi.feishu.cn/wiki/QPe5w5g7UisbEkkow8XcDmOpn8e"
          FEISHU_STORAGE_STATE_JSON: ${{ secrets.FEISHU_STORAGE_STATE_JSON }}
          TZ: Asia/Shanghai
        run: python scripts/sync_waytoagi_deep.py

      - name: Commit cache and status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sources/waytoagi/
          if git diff --cached --quiet; then
            echo "No deep WayToAGI cache changes to commit."
          else
            git commit -m "chore(sources): deepen WayToAGI cache"
            git push
          fi

      - name: Fail workflow when both deep and fallback synchronization failed
        if: steps.sync.outcome == 'failure'
        run: |
          echo "WayToAGI deep synchronization failed. See status.json for details."
          exit 1
