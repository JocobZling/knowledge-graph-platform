server:
  port: 8080

spring:
  application:
    name: knowledge-graph-backend
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/knowledge_graph
    username: postgres
    password: postgres
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
